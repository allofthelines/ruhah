{% extends "core/base.html" %}
{% load static %}

{% block page-header %}
  Click
{% endblock %}

{% block content %}
<div id="video-wrapper" style="width: 100%; display: flex; justify-content: center; align-items: center; height: calc(100vh - 50px);">
    <div id="video-container" style="width: 70%; max-width: 2000px; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
        <iframe
            src="https://www.youtube.com/embed/5EzTJ1RiwyA"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        </iframe>
    </div>
</div>
{% endblock %}
